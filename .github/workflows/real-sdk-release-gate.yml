name: Real SDK Release Gate

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "verify-node.mjs"
      - ".github/workflows/real-sdk-release-gate.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "verify-node.mjs"
      - ".github/workflows/real-sdk-release-gate.yml"

permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install real OpenTelemetry SDK and package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip freeze

      - name: Run deterministic core tests against real SDK imports
        run: python -m unittest tests.test_processor -v

      - name: Run real SDK integration tests
        run: python -m unittest tests.test_real_sdk_integration -v

      - name: Regenerate signed conformance receipt
        run: python scripts/generate_conformance.py

      - name: Verify receipt independently in Node
        run: node verify-node.mjs artifacts/conformance-receipt.json
